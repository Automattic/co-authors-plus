name: Behat Tests

on:
  pull_request:
    paths:
      - '.github/workflows/behat.yml'
      - '**.php'
      - '**.feature'
      - 'behat.yml'
      - 'composer.json'
  push:
    branches:
      - develop
      - main
    paths:
      - '.github/workflows/behat.yml'
      - '**.php'
      - '**.feature'
      - 'behat.yml'
      - 'composer.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  behat:
    name: Behat
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_cli_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3 --entrypoint sh mysql:8.0 -c "exec docker-entrypoint.sh mysqld --default-authentication-plugin=mysql_native_password"

    env:
      WP_CLI_TEST_DBROOTUSER: root
      WP_CLI_TEST_DBROOTPASS: root
      WP_CLI_TEST_DBNAME: wp_cli_test
      WP_CLI_TEST_DBUSER: wp_cli_test
      WP_CLI_TEST_DBPASS: password1
      WP_CLI_TEST_DBHOST: 127.0.0.1:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # 2.36.0
        with:
          php-version: '7.4'
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@3cf229dc2919194e9e36783941438d17239e8520 # 3.1.1

      - name: Install WordPress test environment
        run: composer prepare-behat-tests

      - name: Run Behat tests
        run: composer behat

      - name: Rerun failed tests
        if: failure()
        run: composer behat-rerun
